<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YusufxonPro Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #ffffff; --input-bg: #f2f2f7; --text: #000000; --sub: #8e8e93; --border: #e5e5ea; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); }

        /* Banner */
        .banner {
            width: 100%; height: 180px; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #fff; text-align: center; border-radius: 0 0 30px 30px;
            margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .banner h1 { font-size: 26px; font-weight: 900; letter-spacing: 2px; }
        .banner p { font-size: 12px; opacity: 0.7; margin-top: 5px; }

        /* Login */
        #login-section { padding: 0 30px; display: none; flex-direction: column; }
        .input-box { margin-bottom: 15px; }
        .input-box label { display: block; font-size: 11px; font-weight: 700; color: var(--sub); margin-bottom: 6px; }
        input {
            width: 100%; padding: 18px; background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 16px; font-size: 17px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #000; background: #fff; }

        /* Dashboard */
        #main-app { display: none; }
        .app-header { padding: 20px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .cargo-card { 
            background: #fff; border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin: 15px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        /* FAB */
        .fab { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: #000; color: #fff; border-radius: 50%; border: none; font-size: 35px; z-index: 1000; }
    </style>
</head>
<body>

    <div class="banner">
        <img src="https://i.postimg.cc/d1X5vYfK/M-LOGOG.png" style="width: 80px; margin-bottom: 10px;">
        <h1>YUSUFXONPRO</h1>
        <p>YusufxonPro Yuk Markazi | Yusufxonpro.uz</p>
    </div>

    <div id="login-section">
        <div class="input-box"><label>Ism</label><input type="text" id="reg-name" placeholder="Yusufxon"></div>
        <div class="input-box"><label>Familiya</label><input type="text" id="reg-surname" placeholder="Axmatov"></div>
        <div class="input-box"><label>Telefon (faqat raqam)</label><input type="tel" id="reg-phone" placeholder="+998 XX-XXX-XX-XX"></div>
        <button onclick="saveUser()" style="width: 100%; padding: 20px; background: #000; color: #fff; border: none; border-radius: 18px; font-weight: 700; font-size: 16px; margin-top: 10px;">AKKAUNT OCHISH</button>
    </div>

    <div id="main-app">
        <div id="list"></div>
        <button class="fab" onclick="addCargo()">+</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Telefon raqami uchun faqat raqam va formatlash
        const phoneInput = document.getElementById('reg-phone');
        phoneInput.addEventListener('input', (e) => {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,2})(\d{0,3})(\d{0,2})(\d{0,2})/);
            if (!x[2]) e.target.value = x[1] ? '+998 ' : '';
            else e.target.value = '+998 ' + x[2] + (x[3] ? '-' + x[3] : '') + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
        });

        function saveUser() {
            const name = document.getElementById('reg-name').value;
            const surname = document.getElementById('reg-surname').value;
            const phone = document.getElementById('reg-phone').value;

            if (name && surname && phone.length >= 17) {
                localStorage.setItem('y_u', JSON.stringify({name, surname, phone}));
                tg.HapticFeedback.notificationOccurred('success');
                location.reload();
            } else {
                tg.showAlert("Iltimos, hamma qatorni to'g'ri to'ldiring!");
            }
        }

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('y_u'));
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                render();
            } else {
                document.getElementById('login-section').style.display = 'flex';
            }
        };

        function addCargo() {
            const txt = prompt("Yuk tavsifini yozing (Masalan: Spark, Toshkent):");
            if (txt) {
                const c = JSON.parse(localStorage.getItem('y_c') || '[]');
                c.unshift({ id: Date.now(), txt, active: true });
                localStorage.setItem('y_c', JSON.stringify(c));
                render();
            }
        }

        function render() {
            const list = document.getElementById('list');
            const c = JSON.parse(localStorage.getItem('y_c') || '[]');
            list.innerHTML = c.map((i, idx) => `
                <div class="cargo-card">
                    <div style="font-size: 10px; font-weight: 800; color: #34c759; margin-bottom: 5px;">● 24/7 FAOL</div>
                    <div style="font-size: 17px; font-weight: 600;">${i.txt}</div>
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button onclick="del(${idx})" style="flex: 1; padding: 10px; border-radius: 10px; border: none; background: #fff0f0; color: #ff3b30; font-weight: 600;">O'CHIRISH</button>
                    </div>
                </div>
            `).join('');
        }

        function del(idx) {
            const c = JSON.parse(localStorage.getItem('y_c'));
            c.splice(idx, 1);
            localStorage.setItem('y_c', JSON.stringify(c));
            render();
        }
    </script>
</body>
</html>
